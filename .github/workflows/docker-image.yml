name: Docker Image CI

on:
  push:
    branches:
      - master
      - dev
    tags:
      - v*
  pull_request:
    branches:
      - master

jobs:

  build:

    runs-on: ubuntu-latest

    # Two independent images. Both build from the repo-root context (the
    # npm-workspaces monorepo root) with their own member Dockerfile, and each
    # pushes to its own Docker Hub repo. Add new images by extending this matrix.
    strategy:
      fail-fast: false
      matrix:
        include:
          - context: .
            dockerfile: gallery/Dockerfile
            repo: responsive-photo-gallery
          - context: .
            dockerfile: enrichment/Dockerfile
            repo: responsive-photo-enrichment-indexer

    steps:
    - uses: actions/checkout@v3
    - name: Log in to Docker Hub
      uses: docker/login-action@f054a8b539a109f9f41c372932f1ae047eff08c9
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    - name: Extract metadata (tags, labels) for Docker
      id: meta
      uses: docker/metadata-action@98669ae865ea3cffbcbaa878cf57c20bbf1c6c38
      with:
        images: ${{ secrets.DOCKER_USERNAME }}/${{ matrix.repo }}
    - name: Build and push Docker image
      uses: docker/build-push-action@ad44023a93711e3deb337508980b4b5e9bcdc5dc
      with:
        context: ${{ matrix.context }}
        file: ${{ matrix.dockerfile }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}
